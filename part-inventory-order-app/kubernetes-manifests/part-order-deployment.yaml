apiVersion: apps/v1
kind: Deployment
metadata:
  name: part-order-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: part-order

  template:
    metadata:
      labels:
        app: part-order
    spec:
      containers:
        - name: part-order
          image: ram1uj/part-order-service:latest
          imagePullPolicy: Always
          env:
            - name: INVENTORY_SERVICE_URL
              value: "http://part-inventory-service"
          ports:
            - containerPort: 8080
