apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-deployment
spec:
  selector:
    matchLabels:
      app: spring-boot
  template:
    metadata:
      labels:
        app: spring-boot

    spec:
      containers:
      - name: spring-boot-container
        image: ram1uj/spring-boot
        imagePullPolicy: Always
        ports:
          - containerPort: 8080
        env:
          - name: APP_MESSAGE
            value: "Hello from Bangalore"
