apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: mysql
spec:
    serviceName: mysql
    replicas: 3
    selector:
      matchLabels:
        app: mysql
    template:
      metadata:
        labels:
          app: mysql
      spec:
        containers:
          - name: mysql
            image: mysql
            imagePullPolicy: Always

            env:
              - name: MYSQL_ROOT_PASSWORD
                value: "password"
              - name: MYSQL_DATABASE
                value: "part_inventory_db"
            ports:
              - containerPort: 3306
            volumeMounts:
              - mountPath: /var/lib/mysql
                name: mysql-data
    volumeClaimTemplates:
      - metadata:
          name: mysql-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi